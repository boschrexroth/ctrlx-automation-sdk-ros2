name: ros2-simple-listener-cpp
version: 3.1.0
summary: Snap with simple ROS 2 listener
description: |
  A simple ROS 2 listener which receives ROS 2 messages on topic 'ros2_simple_cpp'.

title: ROS2 Jazzy Simple Listener
contact: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2
license: MIT
donation: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2/donation
issues: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2/issues
source-code: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2
website: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2

base: core24
grade: stable
confinement: strict
type: app

platforms:
  amd64:
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

parts:
  ros-app:
    plugin: dump
    source: install
    override-build: |
      craftctl default

  wrapper-scripts:
    plugin: dump
    source: wrapper/
    organize:
      ./run-listener.sh : usr/bin/run-listener

apps:
  listener:
    command: usr/bin/run-listener
    plugs:
      - ros-base
      - network
      - network-bind
    daemon: simple
    passthrough:
      restart-condition: always
      restart-delay: 10s

plugs:
  ros-base:
    interface: content
    content: executables
    target: $SNAP/rosruntime

lint:
  ignore:
    - library
