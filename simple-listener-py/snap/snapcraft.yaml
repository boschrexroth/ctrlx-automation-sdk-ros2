name: ros2-listener-py
version: 3.1.0
summary: Simple ROS 2 listener
description: |
  A simple ROS 2 listener to ROS 2 topic 'MinimalPublisher'.

title: ROS2 Jazzy Simple Listener
contact: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2
license: MIT
donation: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2/donation
issues: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2/issues
source-code: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2
website: https://github.com/boschrexroth/ctrlx-automation-sdk-ros2

base: core24
grade: stable
confinement: strict
type: app

platforms:
  amd64:
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

parts:
  ros-app:
    plugin: dump
    source: install
    stage-packages: [libpython3.12]
    override-build: |
      craftctl default

  wrapper-scripts:
    plugin: dump
    source: wrapper/
    organize:
      ./run.sh : usr/bin/run

apps:
  subscriber:
    command: usr/bin/run
    plugs:
      - ros-base
      - network
      - network-bind
    daemon: simple
    passthrough:
      restart-condition: always
      restart-delay: 10s

plugs:
  ros-base:
    interface: content
    content: executables
    target: $SNAP/rosruntime

lint:
  ignore:
    - library:
      - usr/lib/x86_64-linux-gnu/libpython3.12.so.*
